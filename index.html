<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/sitelogo.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Primary Meta Tags (Default) -->
  <title>Daniel's Dossier</title>
  <meta name="title" content="Daniel's Dossier" />
  <meta name="description" content="An Archive. Daniel Eta." />
  <meta name="author" content="Onkhida" />
  <meta name="language" content="English" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://onkhida.me/" />
  <meta property="og:title" content="Daniel's Dossier" />
  <meta property="og:description" content="An Archive. Daniel Eta." />
  <meta property="og:image" content="https://onkhida.me/assets/images/og_image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:site_name" content="Daniel's Dossier" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:url" content="https://onkhida.me/" />
  <meta name="twitter:title" content="Daniel's Dossier" />
  <meta name="twitter:description" content="An Archive. Daniel Eta." />
  <meta name="twitter:image" content="https://onkhida.me/assets/images/og_image.png" />

  <!-- LinkedIn -->
  <meta property="linkedin:title" content="Daniel's Dossier" />

  <!-- Reddit (uses og tags but accepts specific meta) -->
  <meta name="reddit:card" content="link" />

  <!-- Pinterest -->
  <meta name="pinterest:description" content="A collection of thoughts, readings, and technical explorations." />

  <!-- Additional SEO -->
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#ffffff" />

  <!-- Google Fonts - Preconnect for performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">
  <!-- Additional fonts: Playfair Display and Inter (kept alongside existing imports for easy revert) -->
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,700&family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">

  <!-- KaTeX for client-side LaTeX rendering -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>

  <script>
    (async function () {
      try {
        const currentPath = window.location.pathname
        const response = await fetch('/metadata.json')
        const routes = await response.json()
        const route = routes.find(r => r.path === currentPath)

        if (route) {
          const setMeta = (property, content, attribute = 'property') => {
            let el = document.querySelector(`meta[${attribute}="${property}"]`)
            if (!el) {
              el = document.createElement('meta')
              el.setAttribute(attribute, property)
              document.head.appendChild(el)
            }
            el.setAttribute('content', content)
          }

          const absoluteUrl = 'https://onkhida.me' + route.path

          document.title = route.title
          setMeta('title', route.title, 'name')
          setMeta('description', route.description, 'name')

          setMeta('og:type', route.type)
          setMeta('og:url', absoluteUrl)
          setMeta('og:title', route.title)
          setMeta('og:description', route.description)
          setMeta('og:image', route.image)

          setMeta('twitter:card', 'summary_large_image', 'name')
          setMeta('twitter:url', absoluteUrl, 'name')
          setMeta('twitter:title', route.title, 'name')
          setMeta('twitter:description', route.description, 'name')
          setMeta('twitter:image', route.image, 'name')

          setMeta('linkedin:title', route.title)
          setMeta('reddit:card', 'link', 'name')
          setMeta('pinterest:description', route.description, 'name')
        }
      } catch (err) {
        console.warn('Meta tag injection failed:', err)
      }
    })()
  </script>
</head>

<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
